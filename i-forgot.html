<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>I Forgot — Icos</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f14;
      --card: #1a1a24;
      --accent: #c97ef7;
      --accent2: #8b5cf6;
      --text: #f0eaf8;
      --muted: #7a728a;
      --danger: #f87171;
      --border: #2e2840;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 40px;
      gap: 28px;
    }

    h1 {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-top: 8px;
    }

    /* ── Большая кнопка ── */
    .loss-btn {
      width: 200px;
      height: 200px;
      border-radius: 50%;
      border: none;
      background: radial-gradient(circle at 35% 35%, #d89eff, var(--accent2) 60%, #4c1d95);
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      cursor: pointer;
      box-shadow: 0 0 40px 8px rgba(139,92,246,0.35), 0 4px 20px rgba(0,0,0,0.5);
      transition: transform 0.12s ease, box-shadow 0.12s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .loss-btn:active {
      transform: scale(0.93);
      box-shadow: 0 0 20px 4px rgba(139,92,246,0.4), 0 2px 8px rgba(0,0,0,0.4);
    }
    .loss-btn .btn-emoji { font-size: 2rem; }
    .loss-btn .btn-label { font-size: 0.85rem; font-weight: 600; text-align: center; line-height: 1.3; }

    /* ── Карточки статистики ── */
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
      width: 100%;
      max-width: 400px;
    }

    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    .stat-card.total { border-color: var(--accent2); }

    .stat-value {
      font-size: 2rem;
      font-weight: 800;
      color: var(--accent);
      line-height: 1;
    }
    .stat-card.total .stat-value { font-size: 2.4rem; color: #fff; }

    .stat-label {
      font-size: 0.7rem;
      color: var(--muted);
      text-align: center;
      line-height: 1.3;
    }

    /* ── Последние события ── */
    .section-title {
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      align-self: flex-start;
      padding-left: 4px;
      max-width: 400px;
      width: 100%;
    }

    .log {
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .log-item {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.85rem;
    }
    .log-item .log-time { color: var(--muted); font-size: 0.75rem; }
    .log-item .log-index { color: var(--accent2); font-weight: 700; }

    .log-empty {
      color: var(--muted);
      font-size: 0.85rem;
      text-align: center;
      padding: 12px;
    }

    /* ── Кнопка сброса ── */
    .reset-btn {
      margin-top: 8px;
      background: none;
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--muted);
      font-size: 0.75rem;
      padding: 8px 18px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .reset-btn:active { border-color: var(--danger); color: var(--danger); }

    /* ── Анимация пульса при нажатии ── */
    @keyframes pulse-ring {
      0%   { transform: scale(1); opacity: 0.6; }
      100% { transform: scale(1.5); opacity: 0; }
    }
    .pulse-wrapper {
      position: relative;
      display: inline-flex;
    }
    .pulse-ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: var(--accent2);
      animation: pulse-ring 0.5s ease-out forwards;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <h1>I Forgot — Icos 🫧</h1>

  <div class="pulse-wrapper" id="btnWrapper">
    <button class="loss-btn" id="lossBtn" onclick="recordLoss()">
      <span class="btn-emoji">😔</span>
      <span class="btn-label">Я потеряла<br>Icos</span>
    </button>
  </div>

  <div class="stats">
    <div class="stat-card">
      <div class="stat-value" id="countDay">0</div>
      <div class="stat-label">за сутки</div>
    </div>
    <div class="stat-card total">
      <div class="stat-value" id="countTotal">0</div>
      <div class="stat-label">всего</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="countWeek">0</div>
      <div class="stat-label">за неделю</div>
    </div>
  </div>

  <div class="section-title">Последние потери</div>

  <div class="log" id="logList"></div>

  <button class="reset-btn" onclick="resetAll()">Сбросить всё</button>

  <script>
    const STORAGE_KEY = 'icos_losses';

    function load() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); }
      catch { return []; }
    }

    function save(arr) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(arr));
    }

    function recordLoss() {
      const arr = load();
      arr.push(new Date().toISOString());
      save(arr);
      render(arr);
      showPulse();
    }

    function resetAll() {
      if (!confirm('Сбросить все записи?')) return;
      save([]);
      render([]);
    }

    function showPulse() {
      const wrapper = document.getElementById('btnWrapper');
      const ring = document.createElement('div');
      ring.className = 'pulse-ring';
      wrapper.appendChild(ring);
      ring.addEventListener('animationend', () => ring.remove());
    }

    function render(arr) {
      const now = Date.now();
      const DAY  = 24 * 60 * 60 * 1000;
      const WEEK = 7  * DAY;

      const countDay  = arr.filter(t => now - new Date(t).getTime() < DAY ).length;
      const countWeek = arr.filter(t => now - new Date(t).getTime() < WEEK).length;

      document.getElementById('countTotal').textContent = arr.length;
      document.getElementById('countDay').textContent   = countDay;
      document.getElementById('countWeek').textContent  = countWeek;

      const logEl = document.getElementById('logList');
      const recent = arr.slice().reverse().slice(0, 10);
      if (recent.length === 0) {
        logEl.innerHTML = '<div class="log-empty">Пока ничего не потеряно 🎉</div>';
        return;
      }
      logEl.innerHTML = recent.map((t, i) => {
        const d = new Date(t);
        const timeStr = d.toLocaleDateString('ru-RU', { day:'2-digit', month:'2-digit' })
          + ' ' + d.toLocaleTimeString('ru-RU', { hour:'2-digit', minute:'2-digit' });
        const num = arr.length - i;
        return `<div class="log-item">
          <span class="log-index">#${num}</span>
          <span class="log-time">${timeStr}</span>
        </div>`;
      }).join('');
    }

    // Инициализация
    render(load());
  </script>
</body>
</html>
