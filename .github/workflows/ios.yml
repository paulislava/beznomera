name: iOS TestFlight

on:
  push:
    branches: [master]
    paths:
      - 'packages/ios/**'
      - '.github/workflows/ios.yml'
  pull_request:
    paths:
      - 'packages/ios/**'
      - '.github/workflows/ios.yml'
  workflow_dispatch:
    inputs:
      upload:
        description: 'Upload to TestFlight'
        required: true
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

concurrency:
  group: ios-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # PR or manual build-only — fast feedback, no code signing
  build:
    name: Build (verify)
    runs-on: [self-hosted, macOS]
    if: github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && inputs.upload == 'false')

    env:
      RBENV_ROOT: /Users/pkondratov/.rbenv
      PATH: /Users/pkondratov/.rbenv/shims:/Users/pkondratov/.rbenv/bin:/opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin
      LANG: en_US.UTF-8
      LC_ALL: en_US.UTF-8

    steps:
      - uses: actions/checkout@v4

      - name: Select Ruby + install deps
        working-directory: packages/ios
        shell: bash
        run: |
          eval "$(rbenv init - bash)"
          rbenv local 3.3.7
          bundle install

      - name: Generate Xcode project
        working-directory: packages/ios
        run: xcodegen generate

      - name: Build
        working-directory: packages/ios
        shell: bash
        run: |
          eval "$(rbenv init - bash)"
          bundle exec fastlane build

  # Push to master or manual with upload=true — full TestFlight
  testflight:
    name: TestFlight
    runs-on: [self-hosted, macOS]
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/master') ||
      (github.event_name == 'workflow_dispatch' && inputs.upload == 'true')
    environment: dev
    concurrency:
      group: beznomera-testflight
      cancel-in-progress: true

    env:
      RBENV_ROOT: /Users/pkondratov/.rbenv
      PATH: /Users/pkondratov/.rbenv/shims:/Users/pkondratov/.rbenv/bin:/opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin
      LANG: en_US.UTF-8
      LC_ALL: en_US.UTF-8

    steps:
      - uses: actions/checkout@v4

      - name: Unlock keychain
        run: |
          security unlock-keychain -p "${{ secrets.KEYCHAIN_PASSWORD }}" ~/Library/Keychains/login.keychain-db
          security set-keychain-settings -t 7200 ~/Library/Keychains/login.keychain-db

      - name: Select Ruby + install deps
        working-directory: packages/ios
        shell: bash
        run: |
          eval "$(rbenv init - bash)"
          rbenv local 3.3.7
          bundle install

      - name: Generate Xcode project
        working-directory: packages/ios
        run: xcodegen generate

      - name: Fastlane beta
        working-directory: packages/ios
        shell: bash
        env:
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }}
        run: |
          eval "$(rbenv init - bash)"
          bundle exec fastlane beta