name: Dev CI

on:
  push:
    branches:
      - master
  pull_request:
    types: [opened, synchronize, reopened, closed]
  workflow_dispatch:
    inputs:
      deploy:
        description: 'Deploy after build'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-backend:
    runs-on: ubuntu-latest
    environment: dev
    if: github.event_name != 'pull_request' || github.event.action != 'closed'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: backend
          push: true
          tags: |
            ghcr.io/paulislava/beznomera:backend-${{ github.sha }}
            ghcr.io/paulislava/beznomera:backend-latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

  build-web:
    runs-on: ubuntu-latest
    environment: dev
    if: github.event_name != 'pull_request' || github.event.action != 'closed'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: web.Dockerfile
          target: web
          push: true
          tags: |
            ghcr.io/paulislava/beznomera:web-${{ github.sha }}
            ghcr.io/paulislava/beznomera:web-latest
          build-args: |
            BACKEND_API_TOKEN=${{ secrets.BACKEND_API_TOKEN }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

  deploy-backend:
    runs-on: ubuntu-latest
    environment: dev
    needs: build-backend
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.deploy == 'true')
    steps:
      - name: Encode backend config
        id: config
        env:
          BACKEND_CONFIG: ${{ vars.BACKEND_CONFIG }}
        run: echo "b64=$(printf '%s' "$BACKEND_CONFIG" | base64 -w 0)" >> $GITHUB_OUTPUT

      - name: Deploy backend
        uses: appleboy/ssh-action@v1.2.0
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_ACTOR: ${{ github.actor }}
          IMAGE_TAG: ${{ github.sha }}
          CONFIG_B64: ${{ steps.config.outputs.b64 }}
        with:
          host: beznomera.net
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: GHCR_TOKEN,GHCR_ACTOR,IMAGE_TAG,CONFIG_B64
          script: |
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_ACTOR" --password-stdin
            docker pull ghcr.io/paulislava/beznomera:backend-$IMAGE_TAG
            docker stop beznomera_backend || true
            docker rm -f beznomera_backend || true
            echo "$CONFIG_B64" | base64 -d > /tmp/config-backend.yaml
            docker run --name beznomera_backend -d --network host \
              --env-file /home/user/web/beznomera.net/web.env \
              -v /tmp/config-backend.yaml:/config.yaml \
              -v /home/user/web/beznomera.net/ip-location-data:/app/node_modules/ip-location-api/data \
              ghcr.io/paulislava/beznomera:backend-$IMAGE_TAG

      - name: Health check backend
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: beznomera.net
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            for i in $(seq 1 10); do
              if ! docker inspect --format='{{.State.Running}}' beznomera_backend 2>/dev/null | grep -q 'true'; then
                echo "Backend container stopped on attempt $i"
                echo "=== docker logs beznomera_backend ==="
                docker logs beznomera_backend --tail=100 2>&1 || true
                exit 1
              fi
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 http://localhost:3000/api/health 2>/dev/null || echo "000")
              if [ "$STATUS" = "200" ]; then
                echo "Backend healthy on attempt $i"
                exit 0
              fi
              echo "Attempt $i/10: backend not ready (HTTP $STATUS), waiting 15s..."
              sleep 15
            done
            echo "Backend failed health check after 10 attempts"
            echo "=== docker logs beznomera_backend ==="
            docker logs beznomera_backend --tail=100 2>&1 || true
            exit 1

  deploy-web:
    runs-on: ubuntu-latest
    environment: dev
    needs:
      - build-web
      - deploy-backend
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.deploy == 'true')
    steps:
      - name: Deploy web
        uses: appleboy/ssh-action@v1.2.0
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_ACTOR: ${{ github.actor }}
          IMAGE_TAG: ${{ github.sha }}
        with:
          host: beznomera.net
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: GHCR_TOKEN,GHCR_ACTOR,IMAGE_TAG
          script: |
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_ACTOR" --password-stdin
            docker pull ghcr.io/paulislava/beznomera:web-$IMAGE_TAG
            docker stop beznomera_web || true
            docker rm -f beznomera_web || true
            docker run --name beznomera_web -d -p 4000:3000 \
              --env-file /home/user/web/beznomera.net/web.env \
              ghcr.io/paulislava/beznomera:web-$IMAGE_TAG

      - name: Health check web
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: beznomera.net
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            for i in $(seq 1 10); do
              if ! docker inspect --format='{{.State.Running}}' beznomera_web 2>/dev/null | grep -q 'true'; then
                echo "Web container stopped on attempt $i"
                echo "=== docker logs beznomera_web ==="
                docker logs beznomera_web --tail=100 2>&1 || true
                exit 1
              fi
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 http://localhost:4000/health 2>/dev/null || echo "000")
              if [ "$STATUS" = "200" ]; then
                echo "Web healthy on attempt $i"
                exit 0
              fi
              echo "Attempt $i/10: web not ready (HTTP $STATUS), waiting 15s..."
              sleep 15
            done
            echo "Web failed health check after 10 attempts"
            echo "=== docker logs beznomera_web ==="
            docker logs beznomera_web --tail=100 2>&1 || true
            exit 1

  deploy-nginx:
    runs-on: ubuntu-latest
    environment: dev
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.deploy == 'true')
    steps:
      - uses: actions/checkout@v4

      - name: Encode nginx config
        id: nginx-config
        run: echo "content=$(base64 -w 0 nginx/production.conf)" >> $GITHUB_OUTPUT

      - name: Copy nginx config
        uses: appleboy/ssh-action@v1.2.0
        env:
          NGINX_CONTENT: ${{ steps.nginx-config.outputs.content }}
        with:
          host: beznomera.net
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: NGINX_CONTENT
          script: |
            mkdir -p /tmp/beznomera-nginx
            echo "$NGINX_CONTENT" | base64 -d > /tmp/beznomera-nginx/production.conf

      - name: Backup nginx config
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: beznomera.net
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}

          script: |
            NGINX_CONF="/home/user/conf/web/beznomera.net/nginx.ssl.conf_app"
            BACKUP_CONF="/tmp/beznomera-nginx-current.bak"
            if [ -f "$NGINX_CONF" ]; then
              cp "$NGINX_CONF" "$BACKUP_CONF"
              echo "Резервная копия сохранена: $BACKUP_CONF"
            fi

      - name: Deploy nginx config
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: beznomera.net
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}

          script: |
            NGINX_CONF="/home/user/conf/web/beznomera.net/nginx.ssl.conf_app"
            cp /tmp/beznomera-nginx/production.conf "${NGINX_CONF}.new"
            mv "${NGINX_CONF}.new" "$NGINX_CONF"
            echo "✓ Конфиг применён"

      - name: Test nginx config
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: beznomera.net
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}

          script: |
            NGINX_CONF="/home/user/conf/web/beznomera.net/nginx.ssl.conf_app"
            BACKUP_CONF="/tmp/beznomera-nginx-current.bak"
            if nginx -t; then
              echo "✓ Тест конфига успешен"
            else
              echo "✗ ОШИБКА: Тест конфига не прошел!"
              if [ -f "$BACKUP_CONF" ]; then
                mv "$BACKUP_CONF" "$NGINX_CONF"
                echo "Откат к резервной копии выполнен"
              else
                rm -f "$NGINX_CONF"
              fi
              exit 1
            fi

      - name: Restart nginx
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: beznomera.net
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}

          script: |
            NGINX_CONF="/home/user/conf/web/beznomera.net/nginx.ssl.conf_app"
            BACKUP_CONF="/tmp/beznomera-nginx-current.bak"
            if systemctl restart nginx; then
              echo "✓ Nginx успешно перезапущен"
              rm -f "$BACKUP_CONF"
              find "$(dirname "$NGINX_CONF")" -name "bak_nginx.ssl.conf_app.*" -type f -mtime +7 -delete 2>/dev/null || true
            else
              echo "✗ ОШИБКА: Не удалось перезапустить nginx!"
              if [ -f "$BACKUP_CONF" ]; then
                mv "$BACKUP_CONF" "$NGINX_CONF"
                systemctl restart nginx || true
                echo "Откат к резервной копии выполнен, nginx перезапущен"
              fi
              exit 1
            fi

  clean:
    runs-on: ubuntu-latest
    environment: dev
    needs:
      - deploy-backend
      - deploy-web
      - deploy-nginx
    if: always() && (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.deploy == 'true'))
    steps:
      - name: Clean up server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: beznomera.net
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            docker image prune -f
            docker container prune -f

  deploy-preview:
    runs-on: ubuntu-latest
    environment: dev
    needs: [build-web, build-backend]
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    permissions:
      pull-requests: write
    steps:
      - name: Encode backend config
        id: config
        env:
          BACKEND_CONFIG: ${{ vars.BACKEND_CONFIG }}
        run: echo "b64=$(printf '%s' "$BACKEND_CONFIG" | base64 -w 0)" >> $GITHUB_OUTPUT

      - name: Deploy preview
        uses: appleboy/ssh-action@v1.2.0
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_ACTOR: ${{ github.actor }}
          PR_NUMBER: ${{ github.event.number }}
          IMAGE_TAG: ${{ github.sha }}
          CONFIG_B64: ${{ steps.config.outputs.b64 }}
        with:
          host: beznomera.net
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: GHCR_TOKEN,GHCR_ACTOR,PR_NUMBER,IMAGE_TAG,CONFIG_B64
          script: |
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_ACTOR" --password-stdin
            docker pull ghcr.io/paulislava/beznomera:backend-${IMAGE_TAG}
            docker pull ghcr.io/paulislava/beznomera:web-${IMAGE_TAG}

            BACKEND_PORT=$((30000 + PR_NUMBER))
            WEB_PORT=$((40000 + PR_NUMBER))
            BACKEND_NAME="beznomera_backend_pr_${PR_NUMBER}"
            WEB_NAME="beznomera_web_pr_${PR_NUMBER}"

            docker stop $BACKEND_NAME $WEB_NAME 2>/dev/null || true
            docker rm -f $BACKEND_NAME $WEB_NAME 2>/dev/null || true

            printf '%s' "$CONFIG_B64" | base64 -d > /tmp/config-backend-pr-${PR_NUMBER}.yaml

            docker run --name $BACKEND_NAME -d \
              --network host \
              -e APP_PORT=${BACKEND_PORT} \
              --env-file /home/user/web/beznomera.net/web.env \
              -v /tmp/config-backend-pr-${PR_NUMBER}.yaml:/config.yaml \
              -v /home/user/web/beznomera.net/ip-location-data:/app/node_modules/ip-location-api/data \
              ghcr.io/paulislava/beznomera:backend-${IMAGE_TAG}

            docker run --name $WEB_NAME -d \
              -p ${WEB_PORT}:3000 \
              --env-file /home/user/web/beznomera.net/web.env \
              --restart unless-stopped \
              ghcr.io/paulislava/beznomera:web-${IMAGE_TAG}

            cat > /etc/nginx/conf.d/pr-${PR_NUMBER}.beznomera.net.conf << NGINXEOF
            server {
                listen 80;
                server_name pr-${PR_NUMBER}.beznomera.net;

                location /socket.io {
                    proxy_pass http://0.0.0.0:${BACKEND_PORT}/socket.io;
                    proxy_http_version 1.1;
                    proxy_set_header Upgrade \$http_upgrade;
                    proxy_set_header Connection "upgrade";
                    proxy_set_header Host \$host;
                    proxy_set_header X-Real-IP \$remote_addr;
                    proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto \$scheme;
                    proxy_buffering off;
                }

                location /api {
                    proxy_pass http://0.0.0.0:${BACKEND_PORT};
                    proxy_set_header Host \$host;
                    proxy_set_header X-Real-IP \$remote_addr;
                    proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto \$scheme;
                }

                location / {
                    proxy_pass http://127.0.0.1:${WEB_PORT};
                    proxy_set_header Host \$host;
                    proxy_set_header X-Real-IP \$remote_addr;
                    proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto \$scheme;
                }
            }
            NGINXEOF

            nginx -t && systemctl reload nginx

      - name: Health check backend
        uses: appleboy/ssh-action@v1.2.0
        env:
          PR_NUMBER: ${{ github.event.number }}
        with:
          host: beznomera.net
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: PR_NUMBER
          script: |
            BACKEND_PORT=$((30000 + PR_NUMBER))
            BACKEND_NAME="beznomera_backend_pr_${PR_NUMBER}"
            for i in $(seq 1 10); do
              if ! docker inspect --format='{{.State.Running}}' $BACKEND_NAME 2>/dev/null | grep -q 'true'; then
                echo "Backend stopped on attempt $i"
                docker logs $BACKEND_NAME --tail=50 2>&1 || true
                exit 1
              fi
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 http://localhost:${BACKEND_PORT}/api/health 2>/dev/null || echo "000")
              if [ "$STATUS" = "200" ]; then
                echo "Backend healthy on attempt $i"
                exit 0
              fi
              echo "Attempt $i/10: backend not ready (HTTP $STATUS), waiting 10s..."
              sleep 10
            done
            echo "Backend failed health check"
            docker logs $BACKEND_NAME --tail=50 2>&1 || true
            exit 1

      - name: Health check web
        uses: appleboy/ssh-action@v1.2.0
        env:
          PR_NUMBER: ${{ github.event.number }}
        with:
          host: beznomera.net
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: PR_NUMBER
          script: |
            WEB_PORT=$((40000 + PR_NUMBER))
            WEB_NAME="beznomera_web_pr_${PR_NUMBER}"
            for i in $(seq 1 10); do
              if ! docker inspect --format='{{.State.Running}}' $WEB_NAME 2>/dev/null | grep -q 'true'; then
                echo "Web stopped on attempt $i"
                docker logs $WEB_NAME --tail=50 2>&1 || true
                exit 1
              fi
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 http://127.0.0.1:${WEB_PORT}/health 2>/dev/null || echo "000")
              if [ "$STATUS" = "200" ]; then
                echo "Web healthy on attempt $i"
                exit 0
              fi
              echo "Attempt $i/10: web not ready (HTTP $STATUS), waiting 10s..."
              sleep 10
            done
            echo "Web failed health check"
            docker logs $WEB_NAME --tail=50 2>&1 || true
            exit 1

      - name: Update PR description with preview URLs
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request.number;
            const backendPort = 30000 + pr;
            const webPort = 40000 + pr;
            const sha = context.payload.pull_request.head.sha.substring(0, 7);

            const marker_start = '<!-- pr-preview-start -->';
            const marker_end = '<!-- pr-preview-end -->';

            const section = [
              marker_start,
              `---`,
              `🚀 **Preview** — commit \`${sha}\``,
              `| Сервис | URL |`,
              `|---|---|`,
              `| 🌐 Web (subdomain, нужен wildcard DNS \`*.beznomera.net\`) | http://pr-${pr}.beznomera.net |`,
              `| 🌐 Web (прямой порт) | http://beznomera.net:${webPort} |`,
              `| 🔌 Backend | http://beznomera.net:${backendPort}/api/health |`,
              marker_end
            ].join('\n');

            const { data: pullRequest } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr
            });

            const body = pullRequest.body || '';
            const hasSection = body.includes(marker_start);
            const newBody = hasSection
              ? body.replace(new RegExp(`${marker_start}[\\s\\S]*?${marker_end}`), section)
              : body + (body.endsWith('\n') ? '' : '\n') + '\n' + section;

            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr,
              body: newBody
            });

  cleanup-preview:
    runs-on: ubuntu-latest
    environment: dev
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    permissions:
      pull-requests: write
    steps:
      - name: Remove preview from server
        uses: appleboy/ssh-action@v1.2.0
        env:
          PR_NUMBER: ${{ github.event.number }}
        with:
          host: beznomera.net
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: PR_NUMBER
          script: |
            docker stop beznomera_backend_pr_${PR_NUMBER} beznomera_web_pr_${PR_NUMBER} 2>/dev/null || true
            docker rm -f beznomera_backend_pr_${PR_NUMBER} beznomera_web_pr_${PR_NUMBER} 2>/dev/null || true
            rm -f /tmp/config-backend-pr-${PR_NUMBER}.yaml
            rm -f /etc/nginx/conf.d/pr-${PR_NUMBER}.beznomera.net.conf
            nginx -t && systemctl reload nginx || true

      - name: Remove preview section from PR description
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request.number;
            const marker_start = '<!-- pr-preview-start -->';
            const marker_end = '<!-- pr-preview-end -->';

            const { data: pullRequest } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr
            });

            const body = pullRequest.body || '';
            if (!body.includes(marker_start)) return;

            const newBody = body
              .replace(new RegExp(`\n*${marker_start}[\\s\\S]*?${marker_end}`), '')
              .trimEnd();

            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr,
              body: newBody
            });
