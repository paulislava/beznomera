name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - master

concurrency:
  group: pr-preview-${{ github.event.number }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      contents: read
      packages: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute ports
        id: ports
        run: |
          echo "backend_port=$((30000 + ${{ github.event.number }}))" >> $GITHUB_OUTPUT
          echo "web_port=$((40000 + ${{ github.event.number }}))" >> $GITHUB_OUTPUT

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: backend
          push: true
          tags: ghcr.io/paulislava/beznomera:backend-pr-${{ github.event.number }}-${{ github.sha }}
          cache-from: type=gha,scope=backend-pr-${{ github.event.number }}
          cache-to: type=gha,mode=max,scope=backend-pr-${{ github.event.number }}

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: web.Dockerfile
          target: web
          push: true
          tags: ghcr.io/paulislava/beznomera:web-pr-${{ github.event.number }}-${{ github.sha }}
          build-args: |
            BACKEND_API_TOKEN=${{ secrets.BACKEND_API_TOKEN }}
            BACKEND_URL=http://host.docker.internal:${{ steps.ports.outputs.backend_port }}
          cache-from: type=gha,scope=web-pr-${{ github.event.number }}
          cache-to: type=gha,mode=max,scope=web-pr-${{ github.event.number }}

      - name: Encode backend config
        id: config
        env:
          BACKEND_CONFIG: ${{ vars.BACKEND_CONFIG }}
        run: echo "b64=$(printf '%s' "$BACKEND_CONFIG" | base64 -w 0)" >> $GITHUB_OUTPUT

      - name: Deploy preview to server
        uses: appleboy/ssh-action@v1.2.0
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_ACTOR: ${{ github.actor }}
          PR_NUMBER: ${{ github.event.number }}
          IMAGE_TAG: ${{ github.sha }}
          BACKEND_PORT: ${{ steps.ports.outputs.backend_port }}
          WEB_PORT: ${{ steps.ports.outputs.web_port }}
          CONFIG_B64: ${{ steps.config.outputs.b64 }}
        with:
          host: beznomera.net
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: GHCR_TOKEN,GHCR_ACTOR,PR_NUMBER,IMAGE_TAG,BACKEND_PORT,WEB_PORT,CONFIG_B64
          script: |
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_ACTOR" --password-stdin
            docker pull ghcr.io/paulislava/beznomera:backend-pr-${PR_NUMBER}-${IMAGE_TAG}
            docker pull ghcr.io/paulislava/beznomera:web-pr-${PR_NUMBER}-${IMAGE_TAG}

            BACKEND_NAME="beznomera_backend_pr_${PR_NUMBER}"
            WEB_NAME="beznomera_web_pr_${PR_NUMBER}"

            docker stop $BACKEND_NAME $WEB_NAME 2>/dev/null || true
            docker rm -f $BACKEND_NAME $WEB_NAME 2>/dev/null || true

            printf '%s' "$CONFIG_B64" | base64 -d > /tmp/config-backend-pr-${PR_NUMBER}.yaml

            # Backend on host network with a dedicated port
            docker run --name $BACKEND_NAME -d \
              --network host \
              -e APP_PORT=${BACKEND_PORT} \
              --env-file /home/user/web/beznomera.net/web.env \
              -v /tmp/config-backend-pr-${PR_NUMBER}.yaml:/config.yaml \
              -v /home/user/web/beznomera.net/ip-location-data:/app/node_modules/ip-location-api/data \
              ghcr.io/paulislava/beznomera:backend-pr-${PR_NUMBER}-${IMAGE_TAG}

            # Web in bridge mode; reaches backend via host.docker.internal
            docker run --name $WEB_NAME -d \
              --add-host=host.docker.internal:host-gateway \
              -p ${WEB_PORT}:3000 \
              --env-file /home/user/web/beznomera.net/web.env \
              --restart unless-stopped \
              ghcr.io/paulislava/beznomera:web-pr-${PR_NUMBER}-${IMAGE_TAG}

            # Per-PR nginx server block (active once wildcard DNS is set up)
            cat > /etc/nginx/conf.d/pr-${PR_NUMBER}.beznomera.net.conf << NGINXEOF
            server {
                listen 80;
                server_name pr-${PR_NUMBER}.beznomera.net;

                location /socket.io {
                    proxy_pass http://0.0.0.0:${BACKEND_PORT}/socket.io;
                    proxy_http_version 1.1;
                    proxy_set_header Upgrade \$http_upgrade;
                    proxy_set_header Connection "upgrade";
                    proxy_set_header Host \$host;
                    proxy_set_header X-Real-IP \$remote_addr;
                    proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto \$scheme;
                    proxy_buffering off;
                }

                location /api {
                    proxy_pass http://0.0.0.0:${BACKEND_PORT};
                    proxy_set_header Host \$host;
                    proxy_set_header X-Real-IP \$remote_addr;
                    proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto \$scheme;
                }

                location / {
                    proxy_pass http://127.0.0.1:${WEB_PORT};
                    proxy_set_header Host \$host;
                    proxy_set_header X-Real-IP \$remote_addr;
                    proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto \$scheme;
                }
            }
            NGINXEOF

            nginx -t && systemctl reload nginx

      - name: Health check backend
        uses: appleboy/ssh-action@v1.2.0
        env:
          PR_NUMBER: ${{ github.event.number }}
          BACKEND_PORT: ${{ steps.ports.outputs.backend_port }}
        with:
          host: beznomera.net
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: PR_NUMBER,BACKEND_PORT
          script: |
            BACKEND_NAME="beznomera_backend_pr_${PR_NUMBER}"
            for i in $(seq 1 10); do
              if ! docker inspect --format='{{.State.Running}}' $BACKEND_NAME 2>/dev/null | grep -q 'true'; then
                echo "Backend stopped on attempt $i"
                docker logs $BACKEND_NAME --tail=50 2>&1 || true
                exit 1
              fi
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 http://localhost:${BACKEND_PORT}/api/health 2>/dev/null || echo "000")
              if [ "$STATUS" = "200" ]; then
                echo "Backend healthy on attempt $i"
                exit 0
              fi
              echo "Attempt $i/10: backend not ready (HTTP $STATUS), waiting 10s..."
              sleep 10
            done
            echo "Backend failed health check after 10 attempts"
            docker logs $BACKEND_NAME --tail=50 2>&1 || true
            exit 1

      - name: Health check web
        uses: appleboy/ssh-action@v1.2.0
        env:
          PR_NUMBER: ${{ github.event.number }}
          WEB_PORT: ${{ steps.ports.outputs.web_port }}
        with:
          host: beznomera.net
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: PR_NUMBER,WEB_PORT
          script: |
            WEB_NAME="beznomera_web_pr_${PR_NUMBER}"
            for i in $(seq 1 10); do
              if ! docker inspect --format='{{.State.Running}}' $WEB_NAME 2>/dev/null | grep -q 'true'; then
                echo "Web stopped on attempt $i"
                docker logs $WEB_NAME --tail=50 2>&1 || true
                exit 1
              fi
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 http://127.0.0.1:${WEB_PORT}/health 2>/dev/null || echo "000")
              if [ "$STATUS" = "200" ]; then
                echo "Web healthy on attempt $i"
                exit 0
              fi
              echo "Attempt $i/10: web not ready (HTTP $STATUS), waiting 10s..."
              sleep 10
            done
            echo "Web failed health check after 10 attempts"
            docker logs $WEB_NAME --tail=50 2>&1 || true
            exit 1

      - name: Post preview URLs comment
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request.number;
            const backendPort = 30000 + pr;
            const webPort = 40000 + pr;
            const sha = context.payload.pull_request.head.sha.substring(0, 7);

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr
            });

            const marker = '<!-- pr-preview -->';
            const existing = comments.find(c => c.body.includes(marker));
            const body = [
              marker,
              `🚀 **Preview deployed** — commit \`${sha}\``,
              ``,
              `| Сервис | URL |`,
              `|---|---|`,
              `| 🌐 Web (subdomain, нужен wildcard DNS \`*.beznomera.net\`) | http://pr-${pr}.beznomera.net |`,
              `| 🌐 Web (прямой порт) | http://beznomera.net:${webPort} |`,
              `| 🔌 Backend | http://beznomera.net:${backendPort}/api/health |`
            ].join('\n');

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr,
                body
              });
            }

  cleanup-preview:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      pull-requests: write

    steps:
      - name: Remove preview from server
        uses: appleboy/ssh-action@v1.2.0
        env:
          PR_NUMBER: ${{ github.event.number }}
        with:
          host: beznomera.net
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: PR_NUMBER
          script: |
            BACKEND_NAME="beznomera_backend_pr_${PR_NUMBER}"
            WEB_NAME="beznomera_web_pr_${PR_NUMBER}"

            docker stop $BACKEND_NAME $WEB_NAME 2>/dev/null || true
            docker rm -f $BACKEND_NAME $WEB_NAME 2>/dev/null || true
            docker image rm ghcr.io/paulislava/beznomera:backend-pr-${PR_NUMBER}-* 2>/dev/null || true
            docker image rm ghcr.io/paulislava/beznomera:web-pr-${PR_NUMBER}-* 2>/dev/null || true

            rm -f /tmp/config-backend-pr-${PR_NUMBER}.yaml
            rm -f /etc/nginx/conf.d/pr-${PR_NUMBER}.beznomera.net.conf
            nginx -t && systemctl reload nginx || true

      - name: Post cleanup comment
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request.number;
            const marker = '<!-- pr-preview -->';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr
            });
            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: `${marker}\n🛑 **Preview removed** (PR closed)`
              });
            }
