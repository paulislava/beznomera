name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - master

concurrency:
  group: pr-preview-${{ github.event.number }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      contents: read
      packages: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: web.Dockerfile
          target: web
          push: true
          tags: ghcr.io/paulislava/beznomera:web-pr-${{ github.event.number }}-${{ github.sha }}
          build-args: |
            BACKEND_API_TOKEN=${{ secrets.BACKEND_API_TOKEN }}
            BACKEND_URL=https://beznomera.net/api
          cache-from: type=gha,scope=web-pr-${{ github.event.number }}
          cache-to: type=gha,mode=max,scope=web-pr-${{ github.event.number }}

      - name: Deploy preview to server
        uses: appleboy/ssh-action@v1.2.0
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_ACTOR: ${{ github.actor }}
          PR_NUMBER: ${{ github.event.number }}
          IMAGE_TAG: ${{ github.sha }}
        with:
          host: beznomera.net
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: GHCR_TOKEN,GHCR_ACTOR,PR_NUMBER,IMAGE_TAG
          script: |
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_ACTOR" --password-stdin
            docker pull ghcr.io/paulislava/beznomera:web-pr-${PR_NUMBER}-${IMAGE_TAG}

            WEB_PORT=$((40000 + PR_NUMBER))
            WEB_NAME="beznomera_web_pr_${PR_NUMBER}"

            docker stop $WEB_NAME 2>/dev/null || true
            docker rm -f $WEB_NAME 2>/dev/null || true

            docker run --name $WEB_NAME -d \
              -p 127.0.0.1:${WEB_PORT}:3000 \
              --env-file /home/user/web/beznomera.net/web.env \
              --restart unless-stopped \
              ghcr.io/paulislava/beznomera:web-pr-${PR_NUMBER}-${IMAGE_TAG}

            # Write per-PR nginx config
            cat > /etc/nginx/conf.d/pr-${PR_NUMBER}.beznomera.net.conf << NGINXEOF
            server {
                listen 80;
                server_name pr-${PR_NUMBER}.beznomera.net;

                location /socket.io {
                    proxy_pass http://0.0.0.0:3000/socket.io;
                    proxy_http_version 1.1;
                    proxy_set_header Upgrade \$http_upgrade;
                    proxy_set_header Connection "upgrade";
                    proxy_set_header Host \$host;
                    proxy_set_header X-Real-IP \$remote_addr;
                    proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto \$scheme;
                    proxy_buffering off;
                }

                location / {
                    proxy_pass http://127.0.0.1:${WEB_PORT};
                    proxy_set_header Host \$host;
                    proxy_set_header X-Real-IP \$remote_addr;
                    proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto \$scheme;
                }
            }
            NGINXEOF

            nginx -t && systemctl reload nginx

      - name: Health check web
        uses: appleboy/ssh-action@v1.2.0
        env:
          PR_NUMBER: ${{ github.event.number }}
        with:
          host: beznomera.net
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: PR_NUMBER
          script: |
            WEB_PORT=$((40000 + PR_NUMBER))
            WEB_NAME="beznomera_web_pr_${PR_NUMBER}"
            for i in $(seq 1 10); do
              if ! docker inspect --format='{{.State.Running}}' $WEB_NAME 2>/dev/null | grep -q 'true'; then
                echo "Web container stopped on attempt $i"
                docker logs $WEB_NAME --tail=50 2>&1 || true
                exit 1
              fi
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 http://127.0.0.1:${WEB_PORT}/health 2>/dev/null || echo "000")
              if [ "$STATUS" = "200" ]; then
                echo "Web healthy on attempt $i"
                exit 0
              fi
              echo "Attempt $i/10: not ready (HTTP $STATUS), waiting 10s..."
              sleep 10
            done
            echo "Failed health check after 10 attempts"
            docker logs $WEB_NAME --tail=50 2>&1 || true
            exit 1

      - name: Post preview URL comment
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request.number;
            const url = `http://pr-${pr}.beznomera.net`;
            const sha = context.payload.pull_request.head.sha.substring(0, 7);

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr
            });

            const marker = '<!-- pr-preview -->';
            const existing = comments.find(c => c.body.includes(marker));
            const body = `${marker}\n🚀 **Preview deployed**: ${url}\n\nCommit: \`${sha}\``;

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr,
                body
              });
            }

  cleanup-preview:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      pull-requests: write

    steps:
      - name: Remove preview from server
        uses: appleboy/ssh-action@v1.2.0
        env:
          PR_NUMBER: ${{ github.event.number }}
        with:
          host: beznomera.net
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: PR_NUMBER
          script: |
            WEB_NAME="beznomera_web_pr_${PR_NUMBER}"

            docker stop $WEB_NAME 2>/dev/null || true
            docker rm -f $WEB_NAME 2>/dev/null || true
            docker image rm ghcr.io/paulislava/beznomera:web-pr-${PR_NUMBER}-* 2>/dev/null || true

            rm -f /etc/nginx/conf.d/pr-${PR_NUMBER}.beznomera.net.conf
            nginx -t && systemctl reload nginx || true

      - name: Post cleanup comment
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request.number;
            const marker = '<!-- pr-preview -->';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr
            });
            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: `${marker}\n🛑 **Preview removed** (PR closed)`
              });
            }
