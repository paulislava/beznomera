database:
  host: database
  port: 5432              # Optional
  username: postgres      # Optional
  password: postgres
  database: beznomera      # Optional

sms:
  login: LOGIN
  password: PASSWORD
  baseUrl: https://smsc.ru/sys/send.php

auth:
  mode: tel
  codeLength: 4
  jwtSecret: MY_SECRET
  jwtCookie: auth
  anonymousIdCookie: anonymous_id
  passwordSalt: test
  passwordSaltRounds: 10

mail:
  host: smtp.mail.com
  port: 465
  secure: true
  login: LOGIN
  password: PASSWORD
  defaultFrom: BezNomera <beznomera@paulislava.space>

webdav:
  username: guest
  password: guest

telegram:
  token: TOKEN

s3:
  accessKeyId: your_access_key_id
  secretAccessKey: your_secret_access_key
  endpoint: your_endpoint
  bucket: your_bucket_name
  region: your_region

# OAuth — все поля опциональны; провайдер активируется только если заполнен
# oauth:
#   frontendUrl: https://beznomera.net   # куда редиректить после OAuth callback
#   backendUrl: https://beznomera.net    # публичный URL бэкенда (для callbackURL)
#   google:
#     clientId: YOUR_GOOGLE_CLIENT_ID
#     clientSecret: YOUR_GOOGLE_CLIENT_SECRET
#   yandex:
#     clientId: YOUR_YANDEX_CLIENT_ID
#     clientSecret: YOUR_YANDEX_CLIENT_SECRET
#   vk:
#     clientId: YOUR_VK_CLIENT_ID
#     clientSecret: YOUR_VK_CLIENT_SECRET
#   apple:
#     clientId: com.example.app          # Service ID (не Bundle ID)
#     teamId: TEAM_ID
#     keyId: KEY_ID
#     privateKey: |                       # содержимое .p8 файла
#       -----BEGIN PRIVATE KEY-----
#       ...
#       -----END PRIVATE KEY-----

# Generate with: npx web-push generate-vapid-keys
vapid:
  subject: mailto:admin@example.com
  publicKey: YOUR_VAPID_PUBLIC_KEY
  privateKey: YOUR_VAPID_PRIVATE_KEY