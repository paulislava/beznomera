name: BezNomera
options:
  bundleIdPrefix: net.beznomera
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  xcodeVersion: "16"

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: "CS626W9QL6"
    CODE_SIGN_STYLE: Automatic
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"

packages:
  SocketIO:
    url: https://github.com/socketio/socket.io-client-swift
    from: 16.0.0
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: 8.0.0

targets:
  BezNomera:
    type: application
    platform: iOS
    sources:
      - path: Shared
      - path: BezNomera
        excludes:
          - "Resources/Assets.xcassets"
    resources:
      - path: BezNomera/Resources/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.paulislava.beznomera
        INFOPLIST_FILE: BezNomera/Info.plist
        INFOPLIST_KEY_NSCameraUsageDescription: "Для сканирования QR-кодов автомобилей"
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "Для загрузки фото автомобиля и аватара"
        INFOPLIST_KEY_CFBundleDisplayName: "БезНомера"
    entitlements:
      path: BezNomera/BezNomera.entitlements
      properties:
        com.apple.developer.associated-domains:
          - applinks:beznomera.net
        aps-environment: production
    dependencies:
      - package: SocketIO
        product: SocketIO
      - package: GoogleSignIn
        product: GoogleSignIn
